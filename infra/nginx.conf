events {}

http {
  upstream engine_upstream {
    server flowsentinel-engine:8080;
  }

  upstream admin_upstream {
    server flowsentinel-admin:8001;
  }

  server {
    listen 80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Correlation-ID $http_x_correlation_id;

    location = /check {
      proxy_pass http://engine_upstream/check;
    }

    location = /health {
      proxy_pass http://engine_upstream/health;
    }

    location = /rules {
      proxy_pass http://admin_upstream/rules;
    }

    location ~ ^/rules/ {
      proxy_pass http://admin_upstream;
    }

    location = /audit {
      proxy_pass http://admin_upstream/audit;
    }

    location = /admin/health {
      proxy_pass http://admin_upstream/health;
    }
  }
}

